# Runtime configuration for the runner, mounted read-only at
# /home/docker/config/nmpi.cfg. It is a Secret (not a ConfigMap) because it holds
# AUTH_TOKEN. Copy to secret.yaml, fill in AUTH_TOKEN, and keep it out of git.
#
#   cp secret.example.yaml secret.yaml
#   # edit AUTH_TOKEN
#   kubectl apply -f secret.yaml
#
# Prefer a short-lived / narrowly-scoped provider token: in Tier 0 the job process
# still shares the runner's filesystem and could read this file. Tier 1 isolates
# the job into a sandbox that cannot see it.
apiVersion: v1
kind: Secret
metadata:
  name: nmpi-demo-config
  labels:
    app: nmpi-demo
type: Opaque
stringData:
  nmpi.cfg: |
    # NMPI/Saga config for Demo server

    # User
    AUTH_USER=nmpi
    AUTH_TOKEN=

    # Address of the queue server
    NMPI_HOST=https://nmpi-v3.hbpneuromorphic.eu/

    # Identifier for your platform (e.g. "BrainScaleS")
    PLATFORM_NAME=Demo

    # Directory into which Python code will be downloaded/cloned (emptyDir volume)
    WORKING_DIRECTORY=/home/docker/runner

    # Directory into which data files will be written (PVC, served read-only by the
    # file-server container)
    DATA_DIRECTORY=/home/docker/data

    # Base URL for file server
    DATA_SERVER=https://demo.hbpneuromorphic.eu/data/

    DATA_SERVER_IDENTIFIER=DemoRepository

    # Location of the executables that will be used for PyNN scripts
    JOB_EXECUTABLE_PYNN_10=/home/docker/env/neurosci/bin/python
    JOB_EXECUTABLE_PYNN_11=/home/docker/env/neurosci/bin/python

    # Name of the PyNN backend to use (will be appended to the command line)
    DEFAULT_PYNN_BACKEND=nest

    # SLURM partition to use
    JOB_QUEUE=

    # 'fork' adaptor represents the local machine
    JOB_SERVICE_ADAPTOR=fork://localhost

    # Run jobs one at a time: with the fork:// adaptor each job is a process forked
    # on this (small) pod, so concurrent jobs would contend for its CPU/memory.
    MAX_CONCURRENT_JOBS=1

    # Wrap each untrusted job in a bubblewrap sandbox (no network, isolated
    # namespaces, resource/time limits). Needs unprivileged user namespaces.
    SANDBOX_WRAPPER=/home/docker/bin/sandbox-job.sh

    # Delete a job's working directory once its output has been collected.
    CLEANUP_WORKDIR=True

    # Optional: restrict hosts that job code may be fetched from (comma-separated);
    # when unset, any host is allowed. Inline scripts are unaffected.
    # ALLOWED_CODE_HOSTS=github.com,gitlab.com,gitlab.ebrains.eu
