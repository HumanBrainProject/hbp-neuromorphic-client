# Access-Control-Allow-Origin cannot use wildcards like "*.ebrains.eu", so we
# reflect the request Origin back only when it is an https subdomain (or apex)
# of ebrains.eu or hbpneuromorphic.eu; otherwise $cors_origin is empty and the
# header is omitted. This map sits in the http context (conf.d is included there).
map $http_origin $cors_origin {
    default                                                                          "";
    "~*^https://([a-z0-9-]+\.)*(ebrains\.eu|hbpneuromorphic\.eu)$"                    $http_origin;
}

server {
    listen 8080;
    server_name _;
    charset utf-8;
    client_max_body_size 16m;

    location /data/ {
        alias /data/;

        # Directory listing disabled: do not advertise other jobs' outputs.
        autoindex off;

        # Output is written by untrusted jobs. Never let the browser execute or
        # sniff it: force download, block content-type sniffing, neutralise it.
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; sandbox" always;

        # Scope CORS to *.ebrains.eu / *.hbpneuromorphic.eu (see map above).
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Vary Origin always;
    }
}
